document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3KU58d6/2N/WnJbGPdG3OXVm1aONgIIVl1z1F166UdlzF4u5shni9ZbdjUTwcpaOSJgySP5NXpahCOHRCDK0QtJehOKzjFfCEZHRDhiUUpDdqMxYyHRtbwNgX4QiBi0kxsi4sw15FiTn9ssv1aCQYM484mJnwWg14TE7Njxhbf95L5wpZ8zpN4HW0xXc0rOjfHqB017dzgQSJoDlhJ6/Yx/xj3j3yeIt/b//fXejoz9KRn7wnzBgNVl7Bth1xuU9lbpEWgXrMKkObdBfuvnBavyT5Qu6tEKxgtCyERvnLaNUbFIcSdljJpmOuqnnP78f0uBh0HJ3FbUAAAAAElFTkSuQmCC\" alt=\"GSU\" style=\"height:26px;width:auto;display:block\">\n      <\u002Fdiv>\n      <div style=\"line-height:1.15;border-left:1px solid rgba(255,255,255,.22);padding-left:13px\">\n        <div style=\"font-weight:800;font-size:15.5px;color:#ffffff;letter-spacing:.3px;white-space:nowrap\">Emailer Builder<\u002Fdiv>\n        <div style=\"font-size:11px;font-weight:600;color:#7fc6e6;letter-spacing:.3px\">Course Union Network<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <div style=\"font-size:11px;font-weight:700;color:{{ syncColor }};display:flex;align-items:center;gap:5px;white-space:nowrap\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ syncColor }}\"><\u002Fspan>{{ syncLabel }}<\u002Fdiv>\n      <div style=\"font-size:12px;font-weight:600;color:#9fd6ea\">{{ itemCount }} items · {{ activeLabel }}<\u002Fdiv>\n      <button onclick=\"{{ openExport }}\" style=\"display:flex;align-items:center;gap:7px;background:#EE3224;color:#ffffff;border:none;border-radius:9px;padding:9px 16px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap\">Export &amp; finalize<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"background:#ffffff;border-bottom:1px solid #dde3ee;display:flex;align-items:center;gap:4px;padding:0 14px;height:46px;flex:none;overflow-x:auto\">\n    <sc-for list=\"{{ monthTabs }}\" as=\"m\" hint-placeholder-count=\"3\">\n      <button onclick=\"{{ m.onClick }}\" style=\"display:flex;align-items:center;gap:7px;border:none;background:{{ m.bg }};color:{{ m.fg }};font-weight:700;font-size:13px;padding:7px 14px;border-radius:9px 9px 0 0;cursor:pointer;white-space:nowrap;position:relative;top:1px;border-bottom:2px solid {{ m.bar }}\">\n        <span>{{ m.label }}<\u002Fspan>\n        <sc-if value=\"{{ m.archived }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:10px;font-weight:800;color:#9aa6c0\">🔒<\u002Fspan><\u002Fsc-if>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n    <button onclick=\"{{ openNewMonth }}\" style=\"border:1px dashed #c4ccda;background:transparent;color:#6b7585;font-weight:700;font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer;margin-left:6px;white-space:nowrap\">+ New month<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;display:flex;min-height:0\">\n\n    <div style=\"width:454px;flex:none;border-right:1px solid #dde3ee;background:#f1f7fb;overflow-y:auto;padding:18px\">\n\n      <sc-if value=\"{{ archived }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;background:#fff7e6;border:1px solid #f0dcae;border-radius:11px;padding:14px 16px;margin-bottom:16px\">\n          <span style=\"font-size:16px\">🔒<\u002Fspan>\n          <div style=\"font-size:13px;line-height:1.5;color:#7a6420\"><b>This month is archived.<\u002Fb> It's locked for editing. Switch to a current month to add items, or export the finalized HTML.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ canEdit }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#ffffff;border:1px solid #e2e7f0;border-radius:14px;padding:18px;box-shadow:0 1px 2px rgba(20,36,63,.04)\">\n          <div style=\"font-weight:800;font-size:15px;color:#003A5D;margin-bottom:3px\">Add an item<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#6b7585;margin-bottom:15px;line-height:1.5\">Describe it loosely. AI sorts it into the right section and writes the entry.<\u002Fdiv>\n\n          <label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px\">Type<\u002Flabel>\n          <select name=\"type\" value=\"{{ form.type }}\" onchange=\"{{ onFormInput }}\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;color:#2a3344;background:#fff;margin-bottom:13px;cursor:pointer\">\n            <option value=\"{{ o.id }}\">{{ o.label }}<\u002Foption>\n          <\u002Fselect>\n\n          <label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px\">Title<\u002Flabel>\n          <input name=\"title\" value=\"{{ form.title }}\" onchange=\"{{ onFormInput }}\" placeholder=\"e.g. Summer grad mixer\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;color:#2a3344;margin-bottom:13px;outline:none\">\n\n          <label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px\">Details<\u002Flabel>\n          <textarea name=\"details\" value=\"{{ form.details }}\" onchange=\"{{ onFormInput }}\" placeholder=\"What's happening, who it's for, why it matters…\" rows=\"3\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;color:#2a3344;margin-bottom:13px;outline:none;resize:vertical;line-height:1.5\"><\u002Ftextarea>\n\n          <div style=\"display:flex;gap:11px;margin-bottom:13px\">\n            <div style=\"flex:1\">\n              <label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px\">When <span style=\"font-weight:500;text-transform:none\">(optional)<\u002Fspan><\u002Flabel>\n              <input name=\"date\" value=\"{{ form.date }}\" onchange=\"{{ onFormInput }}\" placeholder=\"June 25, 6 PM\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;color:#2a3344;outline:none\">\n            <\u002Fdiv>\n            <div style=\"flex:1\">\n              <label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px\">Link <span style=\"font-weight:500;text-transform:none\">(optional)<\u002Fspan><\u002Flabel>\n              <input name=\"link\" value=\"{{ form.link }}\" onchange=\"{{ onFormInput }}\" placeholder=\"https://…\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;color:#2a3344;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px\">Submitted by<\u002Flabel>\n          <input name=\"by\" value=\"{{ form.by }}\" onchange=\"{{ onFormInput }}\" placeholder=\"Name / role\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;color:#2a3344;margin-bottom:13px;outline:none\">\n\n          <button onclick=\"{{ submitItem }}\" style=\"width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:{{ aiBtnBg }};color:#fff;border:none;border-radius:10px;padding:12px;font-weight:800;font-size:14px;cursor:pointer;white-space:nowrap\">\n            <span>✦<\u002Fspan><span>{{ aiBtnLabel }}<\u002Fspan>\n          <\u002Fbutton>\n          <div style=\"display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px\">\n            <span style=\"font-size:11.5px;font-weight:700;color:{{ aiBadgeColor }};background:{{ aiBadgeBg }};padding:4px 10px;border-radius:20px\">✦ {{ aiRemaining }} of {{ aiLimit }} AI uses left today<\u002Fspan>\n            <button onclick=\"{{ openAiReset }}\" style=\"font-size:11.5px;font-weight:700;color:#0089b0;background:transparent;border:none;cursor:pointer;text-decoration:underline;padding:2px 0\">Admin reset<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <button onclick=\"{{ openIntro }}\" style=\"width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;color:#003A5D;border:1px solid #d4dae6;border-radius:11px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;margin-top:12px\">✎ Edit President's intro letter<\u002Fbutton>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin:22px 4px 11px\">\n        <div style=\"font-weight:800;font-size:13px;color:#003A5D;text-transform:uppercase;letter-spacing:.6px\">Items this month<\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:700;color:#9aa6c0\">{{ itemCount }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:1.5px dashed #cdd5e2;border-radius:12px;padding:26px 18px;text-align:center;color:#8b95a8;font-size:13px;line-height:1.55\">No items yet.<br>Add one above and watch it land in the emailer.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <sc-for list=\"{{ itemRows }}\" as=\"it\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid #e2e7f0;border-radius:12px;box-shadow:0 1px 2px rgba(20,36,63,.04);overflow:hidden\">\n            <div style=\"padding:13px 14px;display:flex;gap:11px;align-items:flex-start\">\n              <div style=\"width:8px;height:8px;border-radius:50%;background:{{ it.accent }};margin-top:6px;flex:none\"><\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-weight:700;font-size:14px;color:#1f2a40;line-height:1.3;overflow-wrap:anywhere\">{{ it.title }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap\">\n                  <span style=\"font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:{{ it.accent }};background:{{ it.accentBg }};padding:3px 7px;border-radius:5px\">{{ it.statusLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ it.by }}\" hint-placeholder-val=\"\"><span style=\"font-size:11.5px;color:#9aa6c0;font-weight:600\">{{ it.by }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ it.ready }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;gap:4px;flex:none\">\n                  <button onclick=\"{{ it.onEdit }}\" title=\"Tweak\" style=\"border:1px solid #e2e7f0;background:#f6f8fb;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:13px;color:#56607a\">✎<\u002Fbutton>\n                  <button onclick=\"{{ it.onRemove }}\" title=\"Remove\" style=\"border:1px solid #f2dede;background:#fdf4f4;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:13px;color:#c0492f\">✕<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ it.placing }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:18px;height:18px;border:2.5px solid #bfe3f2;border-top-color:#00B5D1;border-radius:50%;animation:spin .7s linear infinite;flex:none;margin-top:4px\"><\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ it.isEditing }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border-top:1px solid #eef1f6;background:#f9fbfd;padding:14px;animation:fadein .15s ease\">\n                <div style=\"font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#003A5D;margin-bottom:11px\">Tweak this entry<\u002Fdiv>\n\n                <label style=\"display:block;font-size:11px;font-weight:700;color:#56607a;margin-bottom:5px\">Section<\u002Flabel>\n                <select name=\"section\" value=\"{{ editDraft.section }}\" onchange=\"{{ onEditInput }}\" style=\"width:100%;padding:8px 10px;border:1px solid #d4dae6;border-radius:8px;font-size:13px;background:#fff;margin-bottom:11px;cursor:pointer\">\n                  <option value=\"{{ o.id }}\">{{ o.label }}<\u002Foption>\n                <\u002Fselect>\n\n                <label style=\"display:block;font-size:11px;font-weight:700;color:#56607a;margin-bottom:5px\">Headline<\u002Flabel>\n                <input name=\"headline\" value=\"{{ editDraft.headline }}\" onchange=\"{{ onEditInput }}\" style=\"width:100%;padding:8px 10px;border:1px solid #d4dae6;border-radius:8px;font-size:13px;margin-bottom:11px;outline:none\">\n\n                <label style=\"display:block;font-size:11px;font-weight:700;color:#56607a;margin-bottom:5px\">Meta line (date / place)<\u002Flabel>\n                <input name=\"meta\" value=\"{{ editDraft.meta }}\" onchange=\"{{ onEditInput }}\" style=\"width:100%;padding:8px 10px;border:1px solid #d4dae6;border-radius:8px;font-size:13px;margin-bottom:11px;outline:none\">\n\n                <label style=\"display:block;font-size:11px;font-weight:700;color:#56607a;margin-bottom:5px\">Body<\u002Flabel>\n                <textarea name=\"body\" value=\"{{ editDraft.body }}\" onchange=\"{{ onEditInput }}\" rows=\"3\" style=\"width:100%;padding:8px 10px;border:1px solid #d4dae6;border-radius:8px;font-size:13px;margin-bottom:11px;outline:none;resize:vertical;line-height:1.5\"><\u002Ftextarea>\n\n                <div style=\"display:flex;gap:10px;margin-bottom:13px\">\n                  <div style=\"flex:1\"><label style=\"display:block;font-size:11px;font-weight:700;color:#56607a;margin-bottom:5px\">Button label<\u002Flabel>\n                    <input name=\"ctaLabel\" value=\"{{ editDraft.ctaLabel }}\" onchange=\"{{ onEditInput }}\" placeholder=\"RSVP\" style=\"width:100%;padding:8px 10px;border:1px solid #d4dae6;border-radius:8px;font-size:13px;outline:none\"><\u002Fdiv>\n                  <div style=\"flex:1\"><label style=\"display:block;font-size:11px;font-weight:700;color:#56607a;margin >\n            <button onclick=\"{{ doAiReset }}\" style=\"flex:1;background:#003A5D;color:#fff;border:none;border-radius:10px;padding:12px;font-weight:800;font-size:14px;cursor:pointer\">↻ Reset allowance<\u002Fbutton>\n            <button onclick=\"{{ closeAiReset }}\" style=\"background:#fff;color:#56607a;border:1px solid #d4dae6;border-radius:10px;padding:12px 16px;font-weight:700;font-size:13.5px;cursor:pointer\">Cancel<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showIntro }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeIntro }}\" style=\"position:fixed;inset:0;background:rgba(15,24,42,.55);display:flex;align-items:center;justify-content:center;z-index:50;animation:fadein .15s ease\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:16px;width:520px;max-width:92vw;box-shadow:0 24px 60px rgba(15,24,42,.4);overflow:hidden\">\n        <div style=\"background:#003A5D;padding:18px 24px\">\n          <div style=\"font-size:11px;font-weight:800;letter-spacing:1.5px;color:#7fc6e6\">PRESIDENT'S LETTER<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:800;color:#fff;margin-top:3px\">Edit the intro letter<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px;max-height:70vh;overflow-y:auto\">\n          <label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;margin-bottom:5px\">Greeting<\u002Flabel>\n          <input name=\"greeting\" value=\"{{ introDraft.greeting }}\" onchange=\"{{ onIntroInput }}\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;margin-bottom:13px;outline:none\">\n\n          <label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;margin-bottom:5px\">Body <span style=\"font-weight:500\">(one paragraph per line)<\u002Fspan><\u002Flabel>\n          <textarea name=\"body\" value=\"{{ introDraft.body }}\" onchange=\"{{ onIntroInput }}\" rows=\"6\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;margin-bottom:13px;outline:none;resize:vertical;line-height:1.55\"><\u002Ftextarea>\n\n          <div style=\"display:flex;gap:11px;margin-bottom:16px\">\n            <div style=\"flex:1\"><label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;margin-bottom:5px\">Sign-off name<\u002Flabel>\n              <input name=\"signName\" value=\"{{ introDraft.signName }}\" onchange=\"{{ onIntroInput }}\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;outline:none\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"display:block;font-size:11.5px;font-weight:700;color:#56607a;margin-bottom:5px\">Title<\u002Flabel>\n              <input name=\"signTitle\" value=\"{{ introDraft.signTitle }}\" onchange=\"{{ onIntroInput }}\" style=\"width:100%;padding:10px 11px;border:1px solid #d4dae6;border-radius:9px;font-size:13.5px;outline:none\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:8px\">\n            <button onclick=\"{{ saveIntro }}\" style=\"background:#003A5D;color:#fff;border:none;border-radius:9px;padding:11px 20px;font-weight:700;font-size:13.5px;cursor:pointer\">Save letter<\u002Fbutton>\n            <button onclick=\"{{ closeIntro }}\" style=\"background:#fff;color:#56607a;border:1px solid #d4dae6;border-radius:9px;padding:11px 18px;font-weight:700;font-size:13.5px;cursor:pointer\">Cancel<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"\">\n    <div style=\"position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#003A5D;color:#fff;padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:0 10px 30px rgba(15,24,42,.35);z-index:60;animation:fadein .2s ease\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;adminPassword&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;amir&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;aiDailyLimit&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;min&quot;:0,&quot;max&quot;:50,&quot;tsType&quot;:&quot;number&quot;},&quot;supabaseUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://zetqoxkchmxdoryxewqn.supabase.co&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;supabaseKey&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;sb_publishable_HBR4aOd5mqC7GLRxd99KsQ_hu6o-GzT&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  SECTIONS = [\n    { id:'cta',           label:'Action Needed',     accent:'#EE3224', accentBg:'#fdecea', blurb:'votes, rallies, urgent calls to action' },\n    { id:'announcements', label:'Announcements',     accent:'#003A5D', accentBg:'#e7eef4', blurb:'general news and updates' },\n    { id:'events',        label:'Events & Socials',  accent:'#0089b0', accentBg:'#e3f4fa', blurb:'socials, workshops, gatherings' },\n    { id:'grants',        label:'Grants & Funding',  accent:'#b07d1f', accentBg:'#fbf2dd', blurb:'funding, bursaries, money deadlines' },\n    { id:'keydates',      label:'Key Dates',         accent:'#4a5b6a', accentBg:'#eef1f4', blurb:'date-only reminders for the recap list' },\n  ];\n  TYPE_OPTIONS = [\n    { id:'events', label:'Event / social' },\n    { id:'grants', label:'Grant / funding' },\n    { id:'cta', label:'Call to action' },\n    { id:'announcements', label:'Announcement' },\n    { id:'keydates', label:'Key date' },\n  ];\n  MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];\n  BLANK = { type:'events', title:'', details:'', by:'', date:'', link:'' };\n  KEY = 'utgsu_emailer_state_v2';\n\n  state = {\n    months: {}, active: '2026-06', online:false, aiQuota:{day:'',count:0},\n    form: { type:'events', title:'', details:'', by:'', date:'', link:'' },\n    editingId:null, editDraft:null,\n    showExport:false, pwInput:'', pwError:false, authed:false,\n    showNewMonth:false, copyLabel:'Copy HTML to clipboard',\n    showIntro:false, introDraft:null,\n    showAiReset:false, aiPw:'', aiPwError:false,\n    toast:null,\n  };\n\n  async componentDidMount(){\n    // 1) instant paint from local cache\n    let cached=null; try{ const raw=localStorage.getItem(this.KEY); if(raw) cached=JSON.parse(raw); }catch(e){}\n    if(cached && cached.months && Object.keys(cached.months).length){\n      this.setState({ months:cached.months, active:cached.active || Object.keys(cached.months)[0] });\n    }\n    // 2) connect to the shared database\n    await this.initDb();\n    if(this.sb){\n      try{\n        let res=await this.loadAll();\n        if(!res || Object.keys(res.months).length===0){\n          const seed=this.seed(); await this.seedToDb(seed); res={ months:seed, quota:{day:'',count:0} };\n        }\n        const active = res.months[this.state.active] ? this.state.active : (Object.keys(res.months).sort()[0]||'2026-06');\n        this.setState({ months:res.months, active, aiQuota:res.quota, online:true }, ()=>this.persistLocal());\n        this.subscribeRealtime();\n        return;\n      }catch(e){ /* fall through to offline */ }\n    }\n    // 3) offline fallback: local cache or seed\n    if(!cached || !cached.months || !Object.keys(cached.months).length){\n      const months=this.seed(); this.setState({ months, active:'2026-06' }, ()=>this.persistLocal());\n    }\n  }\n\n  componentWillUnmount(){ try{ if(this._sub) this.sb.removeChannel(this._sub); }catch(e){} }\n\n  // ---- shared database (Supabase) ----\n  async initDb(){\n    const url=(this.props.supabaseUrl ?? 'https://zetqoxkchmxdoryxewqn.supabase.co').trim();\n    const key=(this.props.supabaseKey ?? 'sb_publishable_HBR4aOd5mqC7GLRxd99KsQ_hu6o-GzT').trim();\n    if(!url || !key) return null;\n    for(let i=0;i<50 && !(window.supabase && window.supabase.createClient); i++){ await new Promise(r=>setTimeout(r,100)); }\n    if(!(window.supabase && window.supabase.createClient)) return null;\n    try{ this.sb=window.supabase.createClient(url, key); return this.sb; }catch(e){ return null; }\n  }\n  itemRow(key, it){ return { id:it.id, month:key, type:it.type||null, submitted_by:it.by||'', status:it.status||'done', fields:it.fields||null, raw:it.raw||null }; }\n  async loadAll(){\n    if(!this.sb) return null;\n    const [mi, it, au] = await Promise.all([\n      this.sb.from('months').select('*'),\n      this.sb.from('items').select('*').order('created_at',{ascending:true}),\n      this.sb.from('ai_usage').select('*').eq('id',1).maybeSingle(),\n    ]);\n    if(mi.error) throw mi.error; if(it.error) throw it.error;\n    const months={};\n    (mi.data||[]).forEach(r=>{ months[r.month]={ archived:!!r.archived, intro:r.intro||this.defaultIntro(), items:[] }; });\n    (it.data||[]).forEach(r=>{\n      if(!months[r.month]) months[r.month]={ archived:false, intro:this.defaultIntro(), items:[] };\n      let item={ id:r.id, type:r.type, by:r.submitted_by||'', status:r.status||'done', fields:r.fields||null, raw:r.raw||null };\n      if(item.status==='placing'){ item.status='done'; if(!item.fields) item.fields=this.fallback(item); }\n      months[r.month].items.push(item);\n    });\n    const quota = (au && au.data) ? { day:au.data.day||'', count:au.data.count||0 } : { day:'', count:0 };\n    return { months, quota };\n  }\n  async seedToDb(seed){\n    if(!this.sb) return;\n    for(const key of Object.keys(seed)){\n      const m=seed[key];\n      await this.sb.from('months').upsert({ month:key, archived:!!m.archived, intro:m.intro||this.defaultIntro() });\n      const rows=(m.items||[]).map(it=>this.itemRow(key,it));\n      if(rows.length) await this.sb.from('item pe:'cta', by:'Maya, VP External', fields:{ section:'cta', headline:'Vote: Fall services levy referendum', meta:'Polls close Wed July 2, 5 PM', body:'Have your say on the proposed graduate services levy. It funds the food bank, legal aid, and the bursary pool, so every vote counts.', cta:{label:'Cast your vote', url:'#'} } }),\n      it({ type:'announcements', by:'UTGSU Office', fields:{ section:'announcements', headline:'New mental-health drop-in hours', meta:'', body:'Free counselling is now available <strong>Wednesdays 1 to 4 PM<\u002Fstrong> at the UTGSU office (16 Bancroft Ave). No appointment needed.', cta:null } }),\n      it({ type:'events', by:'Aisha, VP Events', fields:{ section:'events', headline:'Grad student summer mixer', meta:'Thu June 25, 6 PM, The Grad Room (66 Harbord)', body:'Free pizza, board games, and a chance to meet execs from course unions across campus. Bring a friend.', cta:{label:'RSVP', url:'#'} } }),\n      it({ type:'grants', by:'Finance Committee', fields:{ section:'grants', headline:'Conference travel grant (summer cycle)', meta:'Deadline: Mon June 30', body:'Up to <strong>$750<\u002Fstrong> toward travel for grad students presenting at a conference this summer. Open to all departments.', cta:{label:'Apply now', url:'#'} } }),\n      it({ type:'keydates', by:'', fields:{ section:'keydates', headline:'Travel grant deadline', meta:'June 30', body:'Conference funding closes', cta:null } }),\n      it({ type:'keydates', by:'', fields:{ section:'keydates', headline:'Summer mixer', meta:'June 25', body:'The Grad Room, 6 PM', cta:null } }),\n      it({ type:'keydates', by:'', fields:{ section:'keydates', headline:'Levy referendum closes', meta:'July 2', body:'Last day to vote', cta:null } }),\n    ] } };\n  }\n\n  // ---- helpers ----\n  monthLabel(k){ const [y,m]=k.split('-'); return this.MONTH_NAMES[(+m)-1]+' '+y; }\n  monthShort(k){ const [y,m]=k.split('-'); return this.MONTH_NAMES[(+m)-1].slice(0,3)+' '+y; }\n  sortedKeys(){ return Object.keys(this.state.months).sort(); }\n  activeMonth(){ return this.state.months[this.state.active] || { archived:false, items:[] }; }\n  isArchived(){ return !!this.activeMonth().archived; }\n  secOf(id){ return this.SECTIONS.find(s=>s.id===id) || this.SECTIONS[1]; }\n\n  updateActive(fn){\n    this.setState(s=>{ const m=s.months[s.active]; const nm={...s.months,[s.active]:fn({...m, items:[...m.items]})}; return { months:nm }; }, ()=>this.persist());\n  }\n  setItem(id, fn){\n    this.updateActive(m=>({ ...m, items:m.items.map(it=> it.id===id ? fn(it) : it) }));\n  }\n\n  toast(msg){ this.setState({toast:msg}); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:null}),2200); }\n\n  // ---- form ----\n  onFormInput = (e)=>{ const {name,value}=e.target; this.setState(s=>({form:{...s.form,[name]:value}})); };\n\n  submitItem = async ()=>{\n    const f=this.state.form;\n    if(!f.title.trim()){ this.toast('Add a title first.'); return; }\n    if(this.isArchived()){ this.toast('This month is archived.'); return; }\n    const id='i'+Date.now();\n    const item={ id, type:f.type, by:f.by.trim(), raw:{...f}, status:'placing', fields:null };\n    this.updateActive(m=>({...m, items:[...m.items, item]}));\n    this.setState({form:{...this.BLANK, type:f.type}});\n    if(this.aiRemaining()<=0){\n      this.setItem(id, it=>({...it, status:'done', fields:this.fallback(item)}));\n      this.toast('Daily AI limit reached ('+this.dailyLimit()+'/day). Item added with basic formatting; edit it manually or try again tomorrow.');\n      return;\n    }\n    this.spendAi();\n    let fields; try{ fields=await this.aiPlace(item); } catch(e){ fields=this.fallback(item); }\n    this.setItem(id, it=>({...it, status:'done', fields: fields||it.fields}));\n  };\n\n  rawOf(item){\n    if(item.raw && (item.raw.title || item.raw.details)) return item.raw;\n    const f=item.fields||{};\n    return { type:item.type, title:f.headline||'', details:f.body||'', date:f.meta||'', link:(f.cta&&f.cta.url)||'' };\n  }\n\n  // ---- daily AI quota ----\n  todayStr(){ return new Date().toLocaleDateString('en-CA'); } // YYYY-MM-DD, local\n  dailyLimit(){ const n=parseInt(this.props.aiDailyLimit,10); return (isNaN(n)||n<0)?3:n; }\n  quota(){\n    const q=this.state.aiQuota||{day:'',count:0};\n    if(q.day!==this.todayStr()) return { day:this.todayStr(), count:0 };\n    return q;\n  }\n  aiRemaining(){ return Math.max(0, this.dailyLimit() - this.quota().count); }\n  spendAi(){\n    const q=this.quota(); const day=this.todayStr(); const count=q.count+1;\n    this.setState({ aiQuota:{ day, count } });\n    this.dbSetQuota(day, count);\n  }\n\n  async callAI(prompt){\n    // Inside this Claude environment, use the built-in AI.\n    if(window.claude && window.claude.complete){\n      return await window.claude.complete({ messages:[{role:'user', content:prompt}] });\n    }\n    // Hosted anywhere: relay through the Supabase Edge Function (server-side key).\n    if(this.sb){\n      const { data, error } = await this.sb.functions.invoke('format-item', { body:{ prompt } });\n      if(error) throw error;\n      if(data && data.text) return data.text;\n      throw new Error('no-text');\n    }\n    throw new Error('no-ai');\n  }\n\n  async aiPlace(item){\n    const r=this.rawOf(item);\n    const ids=this.SECTIONS.map(s=>s.id).join(', ');\n    const list=this.SECTIONS.map(s=>`- \"${s.id}\" = ${s.label}: ${s.blurb}`).join('\\n');\n    const prompt=`You are the editor of the UTGSU graduate Course Union monthly emailer. A contributor submitted an item. Decide which section it belongs in and rewrite it as a clear, warm, concise emailer entry. Keep the UTGSU institutional voice: friendly but professional, no hype. Do not add emoji to the text. IMPORTANT: never use an em dash (the \"—\" character); use a period, comma, or \"to\" instead.\n\nSections:\n${list}\n\nSubmitted item:\n- Type hint: ${item.type}\n- Title: ${r.title}\n- Details: ${r.details||'(none)'}\n- When: ${r.date||'(none)'}\n- Link: ${r.link||'(none)'}\n\nReturn ONLY a JSON object (no markdown fences) with exactly these keys:\n{\"section\": one of [${ids}],\n \"headline\": punchy title, max ~55 chars,\n \"meta\": single line with date/time/place, else \"\",\n \"body\": 1-2 sentence description; you may use <strong> for emphasis; no links inside,\n \"cta\": {\"label\":\"short button text\",\"url\":\"the link\"} or null}\nUse \"keydates\" only for date-only reminders with no real description.`;\n    try{\n      const raw=await Promise.race([\n        this.callAI(prompt),\n        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), 25000))\n      ]);\n      const s=raw.indexOf('{'), e=raw.lastIndexOf('}');\n      const obj=JSON.parse(raw.slice(s, e+1));\n      const valid=this.SECTIONS.some(x=>x.id===obj.section);\n      return {\n        section: valid?obj.section:item.type,\n        headline:(obj.headline||r.title).trim(),\n        meta:(obj.meta||'').trim(),\n        body:(obj.body||'').trim(),\n        cta: obj.cta && obj.cta.label ? { label:obj.cta.label, url:obj.cta.url||r.link||'#' } : null,\n      };\n    }catch(err){\n      return this.fallback(item);\n    }\n  }\n  fallback(item){\n    const r=this.rawOf(item);\n    return { section:item.type, headline:(r.title||'').trim(), meta:(r.date||'').trim(), body:(r.details||'').trim(),\n      cta: r.link ? { label:'Learn more', url:r.link } : null };\n  }\n\n  reAI = async ()=>{\n    const id=this.state.editingId; const it=this.activeMonth().items.find(x=>x.id===id); if(!it) return;\n    if(this.aiRemaining()<=0){ this.toast('Daily AI limit reached ('+this.dailyLimit()+'/day). Try again tomorrow.'); return; }\n    this.setState({editingId:null, editDraft:null});\n    this.setItem(id, x=>({...x, status:'placing'}));\n    this.spendAi();\n    let fields;\n    try{ fields=await this.aiPlace(it); }\n    catch(err){ fields=this.fallback(it); }\n    this.setItem(id, x=>({...x, status:'done', fields: fields||x.fields}));\n    this.toast('Redone with AI.');\n  };\n\n  // ---- edit ----\n  startEdit(it){\n    const fl=it.fields||{};\n    this.setState({ editingId:it.id, editDraft:{\n      section:fl.section||it.type, headline:fl.headline||'', meta:fl.meta||'', body:fl.body||'',\n      ctaLabel: fl.cta?fl.cta.label:'', ctaUrl: fl.cta?fl.cta.url:'' } });\n  }\n  onEditInput = (e)=>{ const {name,value}=e.target; this.setState(s=>({editDraft:{...s.editDraft,[name]:value}})); };\n  saveEdit = ()=>{\n    const d=this.state.editDraft, id=this.state.editingId;\n    const fields={ section:d.section, headline:d.headline.trim(), meta:d.meta.trim(), body:d.body.trim(),\n      cta: d.ctaLabel.trim() ? { label:d.ctaLabel.trim(), url:(d.ctaUrl.trim()||'#') } : null };\n    this.setItem(id, it=>({...it, fields}));\n    this.setState({editingId:null, editDraft:null});\n    this.toast('Saved.');\n  };\n  cancelEdit = ()=>this.setState({editingId:null, editDraft:null});\n  removeItem(id){ this.updateActive(mm=>({...mm,items:mm.items.filter(x=>x.id!==id)})); this.dbDeleteItem(id); }\n\n  // ---- intro letter ----\n  openIntro = ()=>{ const intro=this.activeMonth().intro || this.defaultIntro(); this.setState({showIntro:true, introDraft:{...intro}}); };\n  closeIntro = ()=>this.setState({showIntro:false, introDraft:null});\n  onIntroInput = (e)=>{ const {name,value}=e.target; this.setState(s=>({introDraft:{...s.introDraft,[name]:value}})); };\n  saveIntro = ()=>{ const d=this.state.introDraft; this.updateActive(m=>({...m, intro:{...d}})); this.setState({showIntro:false, introDraft:null}); this.toast('Intro letter saved.'); };\n\n  // ---- AI allowance reset (password-gated) ----\n  resetQuota(){ const day=this.todayStr(); this.setState({ aiQuota:{ day, count:0 } }); this.dbSetQuota(day, 0); }\n  openAiReset = ()=>this.setState({showAiReset:true, aiPw:'', aiPwError:false});\n  closeAiReset = ()=>this.setState({showAiReset:false});\n  onAiPw = (e)=>this.setState({aiPw:e.target.value, aiPwError:false});\n  onAiP or:#ffffff;border:1px solid #e1ebf2;border-top:3px solid #0089B0;border-radius:10px;margin-bottom:16px;\"><tr><td style=\"padding:18px 16px;text-align:center;\">\n          <div style=\"font-family:${this.FONT};font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#EE3224;\">${this.esc(f.meta||'TBA')}<\u002Fdiv>\n          <div style=\"font-family:${this.FONT};font-weight:700;font-size:15px;color:#0d2a3f;margin-top:7px;line-height:1.35;\">${this.esc(f.headline)}<\u002Fdiv>\n          ${f.body?`<div style=\"font-family:${this.FONT};font-size:13px;color:#6a7886;line-height:1.5;margin-top:6px;\">${this.esc(f.body)}<\u002Fdiv>`:''}\n        <\u002Ftd><\u002Ftr><\u002Ftable>\n      <\u002Ftd>`;\n    };\n    let rows='';\n    for(let i=0;i<list.length;i+=3){\n      const chunk=list.slice(i,i+3);\n      while(chunk.length<3 && list.length>3) chunk.push(null);\n      rows+=`<tr>${chunk.map(it=>it?cell(it):'<td width=\"33.33%\"><\u002Ftd>').join('')}<\u002Ftr>`;\n    }\n    return `<tr><td style=\"background-color:#eef6fb;padding:34px 32px 20px 32px;\" class=\"mobile-padding\">\n      <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"margin-bottom:20px;\"><tr>\n        <td width=\"14\" valign=\"middle\" style=\"padding-right:9px;\"><div style=\"width:11px;height:11px;background-color:#003A5D;border-radius:2px;\"><\u002Fdiv><\u002Ftd>\n        <td valign=\"middle\" style=\"font-family:${this.FONT};font-weight:800;font-size:13px;letter-spacing:1.6px;text-transform:uppercase;color:#0d2a3f;white-space:nowrap;padding-right:14px;\">Key Dates at a Glance<\u002Ftd>\n        <td valign=\"middle\" width=\"100%\"><div style=\"height:2px;background-color:#d4e6f1;\"><\u002Fdiv><\u002Ftd>\n      <\u002Ftr><\u002Ftable>\n      <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"margin:0 -8px;\">${rows}<\u002Ftable>\n    <\u002Ftd><\u002Ftr>`;\n  }\n\n  letterBlock(intro, label){\n    const paras=(intro.body||'').split('\\n').filter(p=>p.trim()).map(p=>`<p style=\"margin:0 0 16px 0;font-size:15.5px;color:#3a4753;line-height:1.75;\">${this.esc(p)}<\u002Fp>`).join('');\n    return `<tr><td style=\"padding:34px 40px 4px 40px;\" class=\"mobile-padding\">\n      <p style=\"margin:0 0 16px 0;font-size:15.5px;color:#0d2a3f;line-height:1.7;font-weight:700;\">${this.esc(intro.greeting)}<\u002Fp>\n      ${paras}\n      <p style=\"margin:0 0 2px 0;font-size:15.5px;color:#3a4753;line-height:1.7;\">Warm regards,<\u002Fp>\n      <p style=\"margin:0;font-size:15.5px;color:#003A5D;font-weight:800;\">${this.esc(intro.signName)}<\u002Fp>\n      <p style=\"margin:2px 0 0 0;font-size:13px;color:#6a7886;font-weight:600;letter-spacing:.2px;\">${this.esc(intro.signTitle)}<\u002Fp>\n    <\u002Ftd><\u002Ftr>`;\n  }\n\n  defaultIntro(){\n    return { greeting:\"Hi Course Union Executives and Representatives,\",\n      body:\"I hope your semester is going well. There are a few things I want to flag for your attention this month, so please give them a read and share with students in your department where relevant.\\nAs always, feel free to reach out if you have any questions or ideas. I'm here to support you and your Course Union!\",\n      signName:\"Amir Moghadam\", signTitle:\"UTGSU President\" };\n  }\n\n  buildEmail(key){\n    const F=this.FONT;\n    const m=this.state.months[key]||{items:[]};\n    const intro=m.intro || this.defaultIntro();\n    const items=(m.items||[]).filter(it=>it && it.fields);\n    const by={}; this.SECTIONS.forEach(s=>by[s.id]=[]);\n    items.forEach(it=>{ (by[it.fields.section]||by.announcements).push(it); });\n    const label=this.monthLabel(key);\n\n    const issueItems=[...by.cta, ...by.announcements, ...by.events, ...by.grants]\n      .map(it=>({h:it.fields.headline, c:this.themeOf(it.fields.section).c})).filter(x=>x.h).slice(0,6);\n    const preheader=issueItems.map(x=>this.esc(x.h)).join(' \\u2022 ');\n    const tldr = issueItems.length ? `<tr><td style=\"padding:30px 40px 6px 40px;\" class=\"mobile-padding\">\n      <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"background-color:#eef6fb;border-radius:14px;\"><tr><td style=\"padding:22px 26px;\">\n        <div style=\"font-family:${F};font-weight:800;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#0089B0;margin-bottom:14px;\">In this issue<\u002Fdiv>\n        <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">${issueItems.map(x=>`<tr><td width=\"16\" valign=\"top\" style=\"font-family:${F};color:${x.c};font-weight:800;font-size:15px;line-height:1.5;\">&rsaquo;<\u002Ftd><td style=\"font-family:${F};font-weight:600;font-size:14px;color:#1f3340;line-height:1.5;padding-bottom:9px;\">${this.esc(x.h)}<\u002Ftd><\u002Ftr>`).join('')}<\u002Ftable>\n      <\u002Ftd><\u002Ftr><\u002Ftable>\n    <\u002Ftd><\u002Ftr>` : '';\n\n    const order=['cta','announcements','events','grants'];\n    let sectionsHtml='';\n    order.forEach(sid=>{ if(by[sid].length) sectionsHtml+=this.sectionGroup(sid, by[sid]); });\n    const sectionsRow = sectionsHtml ? `<tr><td style=\"padding:8px 40px 26px 40px;\" class=\"mobile-padding\">${sectionsHtml}<\u002Ftd><\u002Ftr>` : '';\n    const keyRow = by.keydates.length ? this.keyDatesBand(by.keydates) : '';\n    const emptyRow = (!sectionsHtml && !by.keydates.length) ? `<tr><td style=\"padding:44px 40px;text-align:center;color:#9aa6b2;font-size:15px;font-family:${F};\">No items yet. Add some on the left and they will appear here.<\u002Ftd><\u002Ftr>` : '';\n\n    return `<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"><title>GSU Course Union Update &middot; ${label}<\u002Ftitle>\n<link href=\"https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\">\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');\nbody{margin:0;padding:0;}\n@media only screen and (max-width:600px){\n .column{width:100%!important;display:block!important;text-align:left!important}\n .key-date-card{margin-bottom:16px!important}\n .mobile-padding{padding-left:22px!important;padding-right:22px!important}\n}\n<\u002Fstyle><\u002Fhead>\n<body style=\"margin:0;padding:0;background-color:#eef1f5;font-family:${F};\">\n<div style=\"display:none;font-size:1px;color:#eef1f5;line-height:1px;max-height:0px;max-width:0px;opacity:0;overflow:hidden;\">${preheader}<\u002Fdiv>\n<table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\" style=\"background-color:#eef1f5;\"><tr><td align=\"center\" style=\"padding:24px 12px 40px 12px;\">\n<table class=\"email-container\" width=\"700\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" align=\"center\" role=\"presentation\" style=\"max-width:700px;margin:0 auto;background-color:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e2e8ef;\">\n\n  <tr><td style=\"background-color:#003A5D;padding:36px 40px 30px 40px;\" class=\"mobile-padding\">\n    <img src=\"${this.LOGO}\" alt=\"University of Toronto Graduate Students' Union\" height=\"38\" style=\"display:block;height:38px;width:auto;border:0;outline:none;text-decoration:none;margin-bottom:20px;\">\n    <div style=\"font-family:${F};font-weight:800;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#52B9E9;\">Course Union Update<\u002Fdiv>\n    <div style=\"font-family:${F};font-weight:800;font-size:30px;color:#ffffff;margin-top:7px;line-height:1.1;\">${label}<\u002Fdiv>\n    <div style=\"font-family:${F};font-weight:500;font-size:14px;color:#9fc6dd;margin-top:6px;\">Your essential info for the month<\u002Fdiv>\n    <div style=\"width:60px;height:4px;background-color:#EE3224;border-radius:2px;margin-top:22px;font-size:0;line-height:0;\">&nbsp;<\u002Fdiv>\n  <\u002Ftd><\u002Ftr>\n\n  ${tldr}\n  ${this.letterBlock(intro, label)}\n  ${keyRow}\n  ${sectionsRow}\n  ${emptyRow}\n\n  <tr><td style=\"background-color:#00263c;padding:34px 40px;\" class=\"mobile-padding\">\n    <img src=\"${this.LOGO}\" alt=\"GSU\" height=\"30\" style=\"display:block;height:30px;width:auto;border:0;margin-bottom:16px;\">\n    <div style=\"font-family:${F};font-size:13.5px;color:#cdd9e2;line-height:1.7;margin-bottom:12px;\">University of Toronto Graduate Students' Union<br>16 Bancroft Avenue, Toronto ON &middot; <a href=\"mailto:president@utgsu.ca\" style=\"color:#52B9E9;text-decoration:none;\">president@utgsu.ca<\u002Fa> &middot; <a href=\"https://utgsu.ca\" style=\"color:#52B9E9;text-decoration:none;\">utgsu.ca<\u002Fa><\u002Fdiv>\n    <div style=\"font-family:${F};font-size:11.5px;color:#7e93a3;line-height:1.6;\">You are receiving this because you are a registered executive of a UTGSU Course Union. <a href=\"#\" style=\"color:#7e93a3;text-decoration:underline;\">Unsubscribe<\u002Fa><\u002Fdiv>\n  <\u002Ftd><\u002Ftr>\n\n<\u002Ftable>\n<\u002Ftd><\u002Ftr><\u002Ftable>\n<\u002Fbody><\u002Fhtml>`;\n  }\n\n  // ---- render ----\n  renderVals(){\n    const s=this.state, m=this.activeMonth(), archived=this.isArchived();\n    const items=(m.items||[]).filter(Boolean);\n    const monthTabs=this.sortedKeys().map(k=>{\n      const active=k===s.active, arch=!!s.months[k].archived;\n      return { label:this.monthShort(k), archived:arch, onClick:()=>this.pickMonth(k),\n        bg: active?'#003A5D':'transparent', fg: active?'#ffffff':'#56607a', bar: active?'#EE3224':'transparent' };\n    });\n    const itemRows=items.map(it=>{\n      const placing=it.status==='placing';\n      const sec=this.secOf(it.fields?it.fields.section:it.type);\n      const title=it.fields?it.fields.headline:(it.raw?it.raw.title:'');\n      return { id:it.id, title, by:it.by||'', placing, ready:!placing,\n        accent:sec.accent, accentBg:sec.accentBg,\n        statusLabel: placing?'Placing with AI…':sec.label,\n        isEditing: s.editingId===it.id,\n        onEdit:()=>this.startEdit(it), onRemove:()=>this.removeItem(it.id) };\n    });\n    const newMonthOptions=this.newMonthCandidates().map(k=>({ label:this.monthLabel(k), onClick:()=>this.addMonth(k) }));\n    return {\n      itemCount:items.length, isEmpty:items.length===0,\n      syncLabel: s.online?'Shared live':'Local only', syncColor: s.online?'#6fe0b5':'#f2c08a',\n      activeLabel:this.monthLabel(s.active),\n      subject:`Course Union Update · Your essential info for ${this.monthLabel(s.active)}`,\n      emailHtml:this.buildEmail(s.active),\n      archived, canEdit:!archived,\n      form:s.form, typeOptions:this.TYPE_OPTIONS, sectionOptions:this.SECTIONS.map(x=>({id:x.id,label:x.label})),\n      onFormInput:this.onFormInput, submitItem:this.submitItem,\n      aiRemaining:this.aiRemaining(), aiLimit:this.dailyLimit(), aiExhausted:this.aiRemaining()<=0,\n      aiBadgeBg: this.aiRemaining()<=0 ? '#fdecea' : (this.aiRemaining()<=1 ? '#fdf0db' : '#e6f4fb'),\n      aiBadgeColor: this.aiRemaining()<=0 ? '#c0492f' : (this.aiRemaining()<=1 ? '#9a6a00' : '#0089b0'),\n      aiBtnLabel: this.aiRemaining()<=0 ? 'Add (AI limit reached)' : 'Add with AI',\n      aiBtnBg: this.aiRemaining()<=0 ? '#7a8694' : '#003A5D',\n      monthTabs, itemRows,\n      editDraft:s.editDraft||{section:'',headline:'',meta:'',body:'',ctaLabel:'',ctaUrl:''},\n      onEditInput:this.onEditInput, saveEdit:this.saveEdit, cancelEdit:this.cancelEdit, reAI:this.reAI,\n      openExport:this.openExport, closeExport:this.closeExport, showExport:s.showExport,\n      needsAuth:!s.authed, authed:s.authed, pwInput:s.pwInput, onPw:this.onPw, onPwKey:this.onPwKey,\n      checkPw:this.checkPw, pwError:s.pwError, pwBorder:s.pwError?'#e0a09a':'#d4dae6',\n      downloadHtml:this.downloadHtml, copyHtml:this.copyHtml, copyLabel:s.copyLabel,\n      archiveMonth:this.archiveMonth, canArchive:!archived,\n      openNewMonth:this.openNewMonth, closeNewMonth:this.closeNewMonth, showNewMonth:s.showNewMonth, newMonthOptions,\n      openIntro:this.openIntro, closeIntro:this.closeIntro, showIntro:s.showIntro,\n      showAiReset:s.showAiReset, openAiReset:this.openAiReset, closeAiReset:this.closeAiReset,\n      aiPw:s.aiPw, onAiPw:this.onAiPw, onAiPwKey:this.onAiPwKey, doAiReset:this.doAiReset, resetAiNow:this.resetAiNow,\n      aiPwError:s.aiPwError, aiPwBorder:s.aiPwError?'#e0a09a':'#d4dae6',\n      introDraft:s.introDraft||{greeting:'',body:'',signName:'',signTitle:''},\n      onIntroInput:this.onIntroInput, saveIntro:this.saveIntro,\n      stop:this.stop, toast:s.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
